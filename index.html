<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Heading -->
    <h1 class="title" id="title">It's Your Birthday? 🎂</h1>

    <!-- Container -->
    <div class="container" id="container">
        <img id="mainImage" src="VIDEO3.jpg" alt="Birthday">

        <div class="btns" id="buttons">
            <button onclick="yesClick()">Yes 💖</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="noClick()">No 😢</button>
        </div>
    </div>

    <!-- Music -->
    <audio id="music" src="birthday.mp3"></audio>

    <!-- Confetti -->
    <canvas id="confetti"></canvas>

    <script src="script.js"></script>

</body>

</html>
